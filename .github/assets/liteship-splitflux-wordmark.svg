<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="480" viewBox="0 0 1500 480" role="img" aria-label="LiteShip wordmark">

  <defs>
    <linearGradient id="lsBlue" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#005BFF"/>
      <stop offset="0.52" stop-color="#06BFFF"/>
      <stop offset="1" stop-color="#43F4FF"/>
    </linearGradient>
    <linearGradient id="lsWarm" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFF04A"/>
      <stop offset="0.48" stop-color="#FFAD00"/>
      <stop offset="1" stop-color="#FF5200"/>
    </linearGradient>
    <linearGradient id="lsSplit" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#006BFF"/>
      <stop offset="0.38" stop-color="#13D6FF"/>
      <stop offset="0.51" stop-color="#FFF04A"/>
      <stop offset="0.72" stop-color="#FF9F00"/>
      <stop offset="1" stop-color="#FF4F00"/>
    </linearGradient>
    <linearGradient id="lsText" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#101723"/>
      <stop offset="0.54" stop-color="#101723"/>
      <stop offset="0.55" stop-color="#007BFF"/>
      <stop offset="1" stop-color="#0AA7FF"/>
    </linearGradient>
    <filter id="lsTexture" x="-12%" y="-12%" width="124%" height="124%" color-interpolation-filters="sRGB">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" seed="27" result="noise"/>
      <feColorMatrix in="noise" type="saturate" values="0" result="gray"/>
      <feComponentTransfer in="gray" result="grain">
        <feFuncA type="table" tableValues="0 0.13"/>
      </feComponentTransfer>
      <feBlend in="SourceGraphic" in2="grain" mode="overlay"/>
    </filter>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <mask id="railCut" maskUnits="userSpaceOnUse" x="0" y="0" width="512" height="512">
      <rect width="512" height="512" fill="white"/>
      <path d="M256 74 L256 424" stroke="black" stroke-width="19" stroke-linecap="round"/>
      <circle cx="256" cy="154" r="31" fill="black"/>
      <circle cx="256" cy="256" r="31" fill="black"/>
      <circle cx="256" cy="358" r="31" fill="black"/>
    </mask>
  </defs>
  <g transform="translate(102 58) scale(0.72)">

  <g id="liteship-icon" mask="url(#railCut)" filter="url(#lsTexture)">
    <path d="M54 405 L58 337 C60 309 74 288 98 274 L151 241 L156 426 L54 426 Z" fill="url(#lsBlue)"/>
    <path d="M176 426 L183 143 C184 115 205 91 244 50 L244 426 Z" fill="url(#lsBlue)"/>
    <path d="M268 426 L268 50 C307 91 328 115 329 143 L336 426 Z" fill="url(#lsWarm)"/>
    <path d="M356 426 L361 241 L414 274 C438 288 452 309 454 337 L458 405 L458 426 L356 426 Z" fill="url(#lsWarm)"/>
  </g>
  </g>
  <g font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" font-weight="850" letter-spacing="-8">
    <text x="490" y="294" font-size="180" fill="#101723">lite</text>
    <text x="818" y="294" font-size="180" fill="#0B8FFF">ship</text>
  </g>
</svg>