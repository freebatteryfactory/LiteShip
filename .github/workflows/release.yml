name: Release (OIDC trusted publishing)

# Triggers on push of a v*.*.* tag. The tag itself is created by the
# maintainer after a release commit lands on the release branch:
#   git tag -a v0.2.0 -m "v0.2.0"
#   git push origin v0.2.0
#
# auth: OIDC trusted publishing — no tokens anywhere. Certification packs the
# already-built fleet once with pnpm (which rewrites `workspace:*` to concrete
# versions), then `liteship ship` verifies and hands those exact tarballs to the
# **npm CLI** (`npm publish <tgz> --provenance`) for the
# upload. npm >= 11.5.1 performs npm's OIDC trusted-publishing token exchange
# natively in CI (id-token: write below); `pnpm publish` does NOT do the exchange
# (pnpm#11513 / pnpm#9812) — that gap was the ENEEDAUTH at 0.4.0 and 0.6.0's first
# cut. So we upgrade the runner's npm to >= 11.5.1 (Node 22 ships npm 10) before the
# ship loop. PREREQUISITE: every publishable package must have a trusted publisher
# configured at https://www.npmjs.com/package/<name>/access (org+repo:
# freebatteryfactory/LiteShip, workflow filename: release.yml — see RELEASING.md
# §Trusted publishing). A package without one fails its publish loudly with an auth
# error; fix the npm-side config and re-run — `liteship ship` treats already-published
# versions as idempotent success, so re-runs are safe. The NPM_TOKEN repo secret is
# dead (its token was revoked) and is no longer read.

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      dry-run:
        description: 'Mint capsules but skip pnpm publish handoff'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

permissions:
  contents: write # creating the GitHub Release + uploading capsule assets
  actions: read # delivery metrics and frozen-artifact admission
  id-token: write # OIDC trusted publishing (pnpm exchanges this for the publish credential)
  attestations: write # GitHub artifact attestations for the exact frozen tarballs

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false # never cancel a release mid-flight

jobs:
  full-authority:
    name: Complete frozen-head authority
    uses: ./.github/workflows/ci.yml
    permissions:
      contents: read
      actions: read

  release-certified:
    name: Frozen release build and certification
    needs: full-authority
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # The reusable CI workflow above proves this exact tag across the complete
    # Linux, browser, platform, Rust/WASM, mutation, MC/DC, and analysis tiers.
    # This job owns only the narrower tag-time publishability question.
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@b0f76dfb45f55f8421693e4803ac7bb65143bd34 # v6
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Download the addressed authority plan
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          name: affected-plan
          path: .liteship
      - name: Download the admitted delivery evidence
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          name: delivery-evidence
          path: .liteship/delivery-evidence
      - name: Bind release evidence to the admitted source and plan
        run: |
          set -euo pipefail
          EVIDENCE_ROOT=.liteship/delivery-evidence/reports
          MANIFEST="$EVIDENCE_ROOT/delivery-evidence-manifest.json"
          RECEIPT="$EVIDENCE_ROOT/delivery-admission-receipt.json"
          CHAIN="$EVIDENCE_ROOT/delivery-receipt-chain.json"
          PLAN=.liteship/affected-plan.json
          test -f "$MANIFEST"
          test -f "$RECEIPT"
          test -f "$CHAIN"
          PLAN_ID=$(jq -er .planId "$PLAN")
          MANIFEST_ID=$(jq -er .manifestId "$MANIFEST")
          CHAIN_DIGEST="sha256:$(sha256sum "$CHAIN" | cut -d ' ' -f 1)"
          CHAIN_STAGES=$(jq -c '[.receipts[] | {kind, receiptId: .hash}]' "$CHAIN")
          jq -e \
            --arg head "$GITHUB_SHA" \
            --arg plan "$PLAN_ID" \
            --arg manifest "$MANIFEST_ID" \
            '(keys | sort) == ["headSha", "manifestId", "planId", "receipts", "schemaVersion"] and .schemaVersion == 1 and .headSha == $head and .planId == $plan and .manifestId == $manifest and (.receipts | length) == 6 and [.receipts[].kind] == ["delivery-intent", "delivery-plan", "delivery-verification", "delivery-artifact", "delivery-policy", "delivery-release"]' \
            "$CHAIN" >/dev/null
          jq -e \
            --arg head "$GITHUB_SHA" \
            --arg plan "$PLAN_ID" \
            --arg repository "$GITHUB_REPOSITORY" \
            --arg workflow "$GITHUB_WORKFLOW" \
            --arg runId "$GITHUB_RUN_ID" \
            --arg runAttempt "$GITHUB_RUN_ATTEMPT" \
            --arg ref "$GITHUB_REF" \
            '.schemaVersion == 2 and .verdict == "accepted" and .headSha == $head and .plan.id == $plan and .github.repository == $repository and .github.workflow == $workflow and .github.runId == $runId and .github.runAttempt == $runAttempt and .github.ref == $ref' \
            "$MANIFEST" >/dev/null
          jq -e \
            --arg head "$GITHUB_SHA" \
            --arg plan "$PLAN_ID" \
            --arg manifest "$MANIFEST_ID" \
            --arg repository "$GITHUB_REPOSITORY" \
            --arg workflow "$GITHUB_WORKFLOW" \
            --arg runId "$GITHUB_RUN_ID" \
            --arg runAttempt "$GITHUB_RUN_ATTEMPT" \
            --arg ref "$GITHUB_REF" \
            --arg chainDigest "$CHAIN_DIGEST" \
            --argjson chainStages "$CHAIN_STAGES" \
            '.schemaVersion == 1 and .verdict == "accepted" and .verifier == "delivery-evidence/standalone-v2" and .headSha == $head and .planId == $plan and .manifestId == $manifest and .github.repository == $repository and .github.workflow == $workflow and .github.runId == $runId and .github.runAttempt == $runAttempt and .github.ref == $ref and .receiptChain.path == "reports/delivery-receipt-chain.json" and .receiptChain.digest == $chainDigest and .receiptChain.stages == $chainStages and [.receiptChain.stages[].kind] == ["delivery-intent", "delivery-plan", "delivery-verification", "delivery-artifact", "delivery-policy", "delivery-release"]' \
            "$RECEIPT" >/dev/null
          echo "LITESHIP_AFFECTED_PLAN_ID=$PLAN_ID" >> "$GITHUB_ENV"
      - run: pnpm run build
      - name: Verify the admitted receipt DAG independently
        run: >-
          pnpm exec tsx scripts/verify-release-delivery-evidence.ts
          .liteship/affected-plan.json
          .liteship/delivery-evidence/reports
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: 1.85.1
          targets: wasm32-unknown-unknown
      - run: pnpm run build:wasm
      - name: Pack the immutable release fleet once
        run: pnpm exec tsx scripts/build-release-artifacts.ts release-artifacts/tarballs
      - name: Generate supply-chain inventory
        run: |
          node packages/liteship/bin/liteship.mjs sbom
          mkdir -p release-artifacts/evidence
          cp -R .liteship/delivery-evidence/reports/. release-artifacts/evidence/
          cp reports/sbom.json release-artifacts/evidence/sbom.cdx.json
          cp reports/vex.json release-artifacts/evidence/vex.cdx.json
          cp .liteship/affected-plan.json release-artifacts/evidence/affected-plan.json
      - name: Mint ShipCapsules over the immutable tarballs
        run: |
          mkdir -p release-artifacts/capsules
          node packages/liteship/bin/liteship.mjs ship --dry-run \
            --artifact-dir release-artifacts/tarballs \
            --capsule-dir release-artifacts/capsules
      - name: Run consumer journeys against the exact release tarballs
        run: pnpm run test:journey
        env:
          CI: true
          GITHUB_SHA: ${{ github.sha }}
          LITESHIP_RELEASE_ARTIFACT_DIR: release-artifacts/tarballs
      - name: Verify the exact release tarballs as an external consumer
        run: |
          node packages/liteship/bin/liteship.mjs package-smoke --hermetic \
            --artifact-dir release-artifacts/tarballs
        env:
          CI: true
          GITHUB_SHA: ${{ github.sha }}
      - name: Upload frozen release build
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: frozen-release-artifacts
          retention-days: 14
          if-no-files-found: error
          path: |
            release-artifacts/
            packages/*/dist/
      - name: Attest the complete frozen release and evidence bundle
        uses: actions/attest-build-provenance@43d14bc2b83dec42d39ecae14e916627a18bb661 # v3
        with:
          subject-path: |
            release-artifacts/tarballs/*.tgz
            release-artifacts/tarballs/release-artifacts.json
            release-artifacts/evidence/**
            release-artifacts/capsules/*.shipcapsule.cbor

  publish:
    name: Publish the fleet (roster from scripts/ci/publish-roster.json) + attach ShipCapsules
    needs: release-certified
    # MUST be a GitHub-hosted runner: npm OIDC trusted publishing rejects self-hosted
    # runners (the token's runner_environment claim) — docs.npmjs.com/trusted-publishers
    # (#supported-cicd-providers). A Blacksmith runner passes the OIDC preflight but the
    # registry then declines the token, so the publish would ENEEDAUTH/403. This job is
    # tag-triggered (not hot-path), so the GitHub-hosted runner's speed cost is irrelevant.
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
        with:
          fetch-depth: 0 # liteship ship reads git rev-parse HEAD + git status

      - uses: pnpm/action-setup@b0f76dfb45f55f8421693e4803ac7bb65143bd34 # v6

      # No registry-url here: setup-node's registry-url writes an
      # `_authToken=${NODE_AUTH_TOKEN}` line into ~/.npmrc, and with no
      # token in the env that dangling reference breaks npmrc parsing
      # before OIDC ever runs. Trusted publishing needs no npmrc auth at
      # all — the npm CLI exchanges the runner's OIDC token at publish
      # time (registry defaults to registry.npmjs.org). Node >= 22.14 is a
      # trusted-publishing requirement; node-version 22 resolves to latest 22.x.
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 22
          cache: pnpm

      # npm's OIDC trusted publishing needs npm CLI >= 11.5.1, but Node 22 ships
      # npm 10. Upgrade it globally so the `npm publish <tgz>` handoff in `liteship ship`
      # (packages/cli/src/commands/ship.ts) performs the OIDC token exchange. `pnpm
      # publish` does NOT do this (pnpm#11513) — hence the ENEEDAUTH at prior cuts.
      - name: Upgrade npm CLI for OIDC trusted publishing (>= 11.5.1)
        run: |
          npm install -g npm@^11.5.1
          echo "npm $(npm --version) will exchange the OIDC token at publish time."

      # Fail loud BEFORE minting anything if the OIDC environment is
      # absent (id-token: write missing or running outside Actions) —
      # otherwise the failure surfaces mid-batch at the first publish.
      - name: OIDC preflight
        if: ${{ inputs.dry-run != 'true' }}
        run: |
          if [ -z "${ACTIONS_ID_TOKEN_REQUEST_URL:-}" ]; then
            echo "::error::No OIDC token endpoint in the job environment (id-token: write missing?). Trusted publishing cannot authenticate."
            exit 1
          fi
          echo "OIDC endpoint present; the npm CLI will exchange the token at publish time."

      - run: pnpm install --frozen-lockfile
      - name: Download the certified build (never rebuild or repack)
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          name: frozen-release-artifacts
          path: .
      - name: Bind publish admission to the certified source and plan
        run: |
          set -euo pipefail
          BUNDLE=release-artifacts/tarballs/release-artifacts.json
          MANIFEST=release-artifacts/evidence/delivery-evidence-manifest.json
          RECEIPT=release-artifacts/evidence/delivery-admission-receipt.json
          CHAIN=release-artifacts/evidence/delivery-receipt-chain.json
          test -f "$BUNDLE"
          test -f "$MANIFEST"
          test -f "$RECEIPT"
          test -f "$CHAIN"
          PLAN_ID=$(jq -er .planId "$BUNDLE")
          MANIFEST_ID=$(jq -er .manifestId "$MANIFEST")
          CHAIN_DIGEST="sha256:$(sha256sum "$CHAIN" | cut -d ' ' -f 1)"
          CHAIN_STAGES=$(jq -c '[.receipts[] | {kind, receiptId: .hash}]' "$CHAIN")
          test "$(jq -er .sourceCommit "$BUNDLE")" = "$GITHUB_SHA"
          jq -e \
            --arg head "$GITHUB_SHA" \
            --arg plan "$PLAN_ID" \
            --arg manifest "$MANIFEST_ID" \
            '(keys | sort) == ["headSha", "manifestId", "planId", "receipts", "schemaVersion"] and .schemaVersion == 1 and .headSha == $head and .planId == $plan and .manifestId == $manifest and (.receipts | length) == 6 and [.receipts[].kind] == ["delivery-intent", "delivery-plan", "delivery-verification", "delivery-artifact", "delivery-policy", "delivery-release"]' \
            "$CHAIN" >/dev/null
          jq -e \
            --arg head "$GITHUB_SHA" \
            --arg plan "$PLAN_ID" \
            --arg repository "$GITHUB_REPOSITORY" \
            --arg workflow "$GITHUB_WORKFLOW" \
            --arg runId "$GITHUB_RUN_ID" \
            --arg runAttempt "$GITHUB_RUN_ATTEMPT" \
            --arg ref "$GITHUB_REF" \
            '.schemaVersion == 2 and .verdict == "accepted" and .headSha == $head and .plan.id == $plan and .github.repository == $repository and .github.workflow == $workflow and .github.runId == $runId and .github.runAttempt == $runAttempt and .github.ref == $ref' \
            "$MANIFEST" >/dev/null
          jq -e \
            --arg head "$GITHUB_SHA" \
            --arg plan "$PLAN_ID" \
            --arg manifest "$MANIFEST_ID" \
            --arg repository "$GITHUB_REPOSITORY" \
            --arg workflow "$GITHUB_WORKFLOW" \
            --arg runId "$GITHUB_RUN_ID" \
            --arg runAttempt "$GITHUB_RUN_ATTEMPT" \
            --arg ref "$GITHUB_REF" \
            --arg chainDigest "$CHAIN_DIGEST" \
            --argjson chainStages "$CHAIN_STAGES" \
            '.schemaVersion == 1 and .verdict == "accepted" and .verifier == "delivery-evidence/standalone-v2" and .headSha == $head and .planId == $plan and .manifestId == $manifest and .github.repository == $repository and .github.workflow == $workflow and .github.runId == $runId and .github.runAttempt == $runAttempt and .github.ref == $ref and .receiptChain.path == "reports/delivery-receipt-chain.json" and .receiptChain.digest == $chainDigest and .receiptChain.stages == $chainStages and [.receiptChain.stages[].kind] == ["delivery-intent", "delivery-plan", "delivery-verification", "delivery-artifact", "delivery-policy", "delivery-release"]' \
            "$RECEIPT" >/dev/null
          echo "LITESHIP_AFFECTED_PLAN_ID=$PLAN_ID" >> "$GITHUB_ENV"
      - name: Re-verify the frozen delivery receipt DAG before publish
        run: >-
          pnpm exec tsx scripts/verify-release-delivery-evidence.ts
          release-artifacts/evidence/affected-plan.json
          release-artifacts/evidence
      - name: Verify GitHub attestations before admission
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          required_subjects=(
            release-artifacts/tarballs/release-artifacts.json
            release-artifacts/evidence/delivery-evidence-manifest.json
            release-artifacts/evidence/delivery-admission-receipt.json
            release-artifacts/evidence/delivery-receipt-chain.json
            release-artifacts/evidence/sbom.cdx.json
            release-artifacts/evidence/vex.cdx.json
          )
          for required in "${required_subjects[@]}"; do
            test -f "$required"
          done
          shopt -s nullglob
          tarballs=(release-artifacts/tarballs/*.tgz)
          capsules=(release-artifacts/capsules/*.shipcapsule.cbor)
          shopt -u nullglob
          test "${#tarballs[@]}" -gt 0
          test "${#capsules[@]}" -gt 0
          mapfile -d '' subjects < <(
            find release-artifacts/tarballs release-artifacts/evidence release-artifacts/capsules \
              -type f -print0 | sort -z
          )
          test "${#subjects[@]}" -gt 0
          for subject in "${subjects[@]}"; do
            gh attestation verify "$subject" \
              --repo "$GITHUB_REPOSITORY" \
              --signer-workflow "$GITHUB_REPOSITORY/.github/workflows/release.yml" \
              --source-digest "$GITHUB_SHA"
          done

      # ─── GitHub Release FIRST, then the ship loop ────────────────────
      # The Release is created BEFORE any package publishes so each
      # package's ShipCapsule can be attached the moment it is minted
      # (inside the loop below). If capsules were only swept up after a
      # fully successful loop, a mid-batch failure would strand the
      # capsules of already-published packages in the dead runner — a
      # retry skips those packages (already on the registry) and can
      # never re-mint their publish evidence (Codex P1, PR #17).
      - name: Resolve version from tag
        if: ${{ inputs.dry-run != 'true' }}
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Generate release notes
        if: ${{ inputs.dry-run != 'true' }}
        run: |
          pnpm exec tsx scripts/extract-changelog-section.ts \
            --version "${{ steps.ver.outputs.version }}" \
            --out "RELEASE_NOTES_v${{ steps.ver.outputs.version }}.md"

      - name: Create GitHub Release (if missing)
        if: ${{ inputs.dry-run != 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ! gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release create "${GITHUB_REF_NAME}" \
              --title "${GITHUB_REF_NAME}" \
              --notes-file "RELEASE_NOTES_v${{ steps.ver.outputs.version }}.md"
          fi

      # ─── roster gate + per-package ship loop ─────────────────────────
      # The publish roster (count + package list, in publish order) is owned
      # by scripts/gen-roster.ts and generated into scripts/ci/publish-roster.json.
      # This step proves that JSON matches the workspace on disk (and that this
      # job carries no hand-written package literals) BEFORE anything mints, so a
      # drifted roster fails here rather than mid-batch.
      - name: Verify publish roster is in sync (gen-roster gate)
        run: pnpm exec tsx scripts/gen-roster.ts --check

      # One `liteship ship` per package: the roster comes from
      # scripts/ci/publish-roster.json (read with jq) in publish order, so the
      # umbrella package (whose deps must already exist on the registry at the
      # new version) publishes LAST. ship itself treats already-published
      # versions as idempotent success (ShipSkippedReceipt), so workflow re-runs
      # after a mid-batch failure are safe with no grep fallback. --provenance
      # links each published tarball to this workflow run via OIDC. Each
      # package's capsule uploads IMMEDIATELY after its ship so no later failure
      # can orphan it; a skipped package mints no capsule — its capsule is
      # already attached by the run that published it.
      - name: liteship ship (per package, OIDC + provenance, attach-as-minted)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ATTACH: ${{ inputs.dry-run != 'true' && github.ref_type == 'tag' }}
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          set -euo pipefail
          DRY_RUN_FLAG=""
          if [ "${{ inputs.dry-run }}" = "true" ]; then
            DRY_RUN_FLAG="--dry-run"
          fi
          UPLOADED_LIST=$(mktemp)

          # Drift guard: the publish count + roster are owned by
          # scripts/gen-roster.ts and generated into scripts/ci/publish-roster.json;
          # the gen-roster --check step above already proved that JSON matches the
          # workspace and that this job carries no hand-written package literals.
          # Read the expected count from the JSON and re-derive the actual on-disk
          # publishable count independently (release.yml's own predicate:
          # `private != true`). If a package is added or removed in packages/
          # without regenerating the roster, this assertion fails loud rather than
          # silently skipping the new one — regenerate with
          # `pnpm exec tsx scripts/gen-roster.ts --write`.
          EXPECTED_PUBLISHABLE=$(jq -r '.expectedPublishable' scripts/ci/publish-roster.json)
          ACTUAL_PUBLISHABLE=$(find packages -maxdepth 2 -name package.json -print0 \
            | xargs -0 -I {} jq -r 'select(.private != true) | .name' {} \
            | wc -l)
          if [ "$ACTUAL_PUBLISHABLE" -ne "$EXPECTED_PUBLISHABLE" ]; then
            echo "::error::Workspace has $ACTUAL_PUBLISHABLE publishable packages but scripts/ci/publish-roster.json expects $EXPECTED_PUBLISHABLE. Regenerate with: pnpm exec tsx scripts/gen-roster.ts --write"
            exit 1
          fi

          for pkg in $(jq -r '.packages[]' scripts/ci/publish-roster.json); do
            echo "::group::$pkg"
            node packages/liteship/bin/liteship.mjs ship --filter "$pkg" --provenance $DRY_RUN_FLAG \
              --artifact-dir release-artifacts/tarballs \
              --capsule-dir release-artifacts/capsules
            if [ "$ATTACH" = "true" ]; then
              shopt -s nullglob
              capsules=(release-artifacts/capsules/*-"$VERSION".shipcapsule.cbor)
              shopt -u nullglob
              for capsule in "${capsules[@]}"; do
                if ! grep -qxF "$capsule" "$UPLOADED_LIST"; then
                  gh release upload "${GITHUB_REF_NAME}" "$capsule" --clobber
                  echo "$capsule" >> "$UPLOADED_LIST"
                fi
              done
            fi
            echo "::endgroup::"
          done

      # Final sweep — belt and braces over the per-package uploads. The
      # nullglob guard keeps a fully-skipped re-run (every capsule already
      # attached by an earlier run, none minted here) from failing on an
      # unmatched glob.
      - name: Attach ShipCapsules to GitHub Release (sweep)
        if: ${{ inputs.dry-run != 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          shopt -s nullglob
          capsules=(release-artifacts/capsules/*-${{ steps.ver.outputs.version }}.shipcapsule.cbor)
          if [ ${#capsules[@]} -gt 0 ]; then
            gh release upload "${GITHUB_REF_NAME}" "${capsules[@]}" --clobber
          else
            echo "No locally-minted capsules to sweep (fully idempotent re-run) — capsules were attached by the original publishing run."
          fi
