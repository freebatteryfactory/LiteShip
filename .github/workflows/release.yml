name: Release (OIDC trusted publishing)

# Triggers on push of a v*.*.* tag. The tag itself is created by the
# maintainer after a release commit lands on the release branch:
#   git tag -a v0.2.0 -m "v0.2.0"
#   git push origin v0.2.0
#
# auth: OIDC trusted publishing — no tokens anywhere. `czap ship` packs each
# package with pnpm (which rewrites `workspace:*` to concrete versions) and then
# hands the tarball to the **npm CLI** (`npm publish <tgz> --provenance`) for the
# upload. npm >= 11.5.1 performs npm's OIDC trusted-publishing token exchange
# natively in CI (id-token: write below); `pnpm publish` does NOT do the exchange
# (pnpm#11513 / pnpm#9812) — that gap was the ENEEDAUTH at 0.4.0 and 0.6.0's first
# cut. So we upgrade the runner's npm to >= 11.5.1 (Node 22 ships npm 10) before the
# ship loop. PREREQUISITE: every publishable package must have a trusted publisher
# configured at https://www.npmjs.com/package/<name>/access (org+repo:
# freebatteryfactory/LiteShip, workflow filename: release.yml — see RELEASING.md
# §Trusted publishing). A package without one fails its publish loudly with an auth
# error; fix the npm-side config and re-run — `czap ship` treats already-published
# versions as idempotent success, so re-runs are safe. The NPM_TOKEN repo secret is
# dead (its token was revoked) and is no longer read.

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      dry-run:
        description: 'Mint capsules but skip pnpm publish handoff'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

permissions:
  contents: write       # creating the GitHub Release + uploading capsule assets
  id-token: write       # OIDC trusted publishing (pnpm exchanges this for the publish credential)

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false   # never cancel a release mid-flight

jobs:
  release-certified:
    name: Release certification (publishability gate)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # The full gauntlet (gauntlet:full — bench / coverage / e2e /
    # timing-sensitive lanes) runs on every PR and on main via
    # .github/workflows/ci.yml > truth-linux. By the time a v*.*.* tag
    # is pushed, main has already cleared that bar. This job's job is
    # the narrower question: are the tarballs publishable RIGHT NOW.
    # Slim, stable, CI-deterministic.
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
      - run: pnpm run typecheck
      - run: pnpm run lint
      - run: pnpm test
        env:
          CI: true
      - run: pnpm run package:smoke
        env:
          CI: true

  publish:
    name: Publish the fleet (roster from scripts/ci/publish-roster.json) + attach ShipCapsules
    needs: release-certified
    # MUST be a GitHub-hosted runner: npm OIDC trusted publishing rejects self-hosted
    # runners (the token's runner_environment claim) — docs.npmjs.com/trusted-publishers
    # (#supported-cicd-providers). A Blacksmith runner passes the OIDC preflight but the
    # registry then declines the token, so the publish would ENEEDAUTH/403. This job is
    # tag-triggered (not hot-path), so the GitHub-hosted runner's speed cost is irrelevant.
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0     # czap ship reads git rev-parse HEAD + git status

      - uses: pnpm/action-setup@v6

      # No registry-url here: setup-node's registry-url writes an
      # `_authToken=${NODE_AUTH_TOKEN}` line into ~/.npmrc, and with no
      # token in the env that dangling reference breaks npmrc parsing
      # before OIDC ever runs. Trusted publishing needs no npmrc auth at
      # all — the npm CLI exchanges the runner's OIDC token at publish
      # time (registry defaults to registry.npmjs.org). Node >= 22.14 is a
      # trusted-publishing requirement; node-version 22 resolves to latest 22.x.
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      # npm's OIDC trusted publishing needs npm CLI >= 11.5.1, but Node 22 ships
      # npm 10. Upgrade it globally so the `npm publish <tgz>` handoff in `czap ship`
      # (packages/cli/src/commands/ship.ts) performs the OIDC token exchange. `pnpm
      # publish` does NOT do this (pnpm#11513) — hence the ENEEDAUTH at prior cuts.
      - name: Upgrade npm CLI for OIDC trusted publishing (>= 11.5.1)
        run: |
          npm install -g npm@^11.5.1
          echo "npm $(npm --version) will exchange the OIDC token at publish time."

      # Fail loud BEFORE minting anything if the OIDC environment is
      # absent (id-token: write missing or running outside Actions) —
      # otherwise the failure surfaces mid-batch at the first publish.
      - name: OIDC preflight
        if: ${{ inputs.dry-run != 'true' }}
        run: |
          if [ -z "${ACTIONS_ID_TOKEN_REQUEST_URL:-}" ]; then
            echo "::error::No OIDC token endpoint in the job environment (id-token: write missing?). Trusted publishing cannot authenticate."
            exit 1
          fi
          echo "OIDC endpoint present; the npm CLI will exchange the token at publish time."

      - run: pnpm install --frozen-lockfile

      - run: pnpm run build

      # Build the czap-compute WASM kernel from Rust and stage it into the core
      # package's dist BEFORE the ship loop packs the tarball — otherwise the
      # published core package carries no `.wasm` and an installed consumer's
      # `czap({ wasm: { enabled: true } })` silently runs the TS fallback (the
      # 0.2.1 fix). Build-truth: rebuilt from source here, never committed.
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable, pinned (2026-03-27)
        with:
          # Pinning to a SHA strips the channel the action otherwise reads from the
          # ref (`@stable`), so name it explicitly or the action errors.
          toolchain: stable
          targets: wasm32-unknown-unknown
      - run: pnpm run build:wasm

      # ─── GitHub Release FIRST, then the ship loop ────────────────────
      # The Release is created BEFORE any package publishes so each
      # package's ShipCapsule can be attached the moment it is minted
      # (inside the loop below). If capsules were only swept up after a
      # fully successful loop, a mid-batch failure would strand the
      # capsules of already-published packages in the dead runner — a
      # retry skips those packages (already on the registry) and can
      # never re-mint their publish evidence (Codex P1, PR #17).
      - name: Resolve version from tag
        if: ${{ inputs.dry-run != 'true' }}
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Generate release notes
        if: ${{ inputs.dry-run != 'true' }}
        run: |
          pnpm exec tsx scripts/extract-changelog-section.ts \
            --version "${{ steps.ver.outputs.version }}" \
            --out "RELEASE_NOTES_v${{ steps.ver.outputs.version }}.md"

      - name: Create GitHub Release (if missing)
        if: ${{ inputs.dry-run != 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ! gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release create "${GITHUB_REF_NAME}" \
              --title "${GITHUB_REF_NAME}" \
              --notes-file "RELEASE_NOTES_v${{ steps.ver.outputs.version }}.md"
          fi

      # ─── roster gate + per-package ship loop ─────────────────────────
      # The publish roster (count + package list, in publish order) is owned
      # by scripts/gen-roster.ts and generated into scripts/ci/publish-roster.json.
      # This step proves that JSON matches the workspace on disk (and that this
      # job carries no hand-written package literals) BEFORE anything mints, so a
      # drifted roster fails here rather than mid-batch.
      - name: Verify publish roster is in sync (gen-roster gate)
        run: pnpm exec tsx scripts/gen-roster.ts --check

      # One `czap ship` per package: the roster comes from
      # scripts/ci/publish-roster.json (read with jq) in publish order, so the
      # umbrella package (whose deps must already exist on the registry at the
      # new version) publishes LAST. ship itself treats already-published
      # versions as idempotent success (ShipSkippedReceipt), so workflow re-runs
      # after a mid-batch failure are safe with no grep fallback. --provenance
      # links each published tarball to this workflow run via OIDC. Each
      # package's capsule uploads IMMEDIATELY after its ship so no later failure
      # can orphan it; a skipped package mints no capsule — its capsule is
      # already attached by the run that published it.
      - name: czap ship (per package, OIDC + provenance, attach-as-minted)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ATTACH: ${{ inputs.dry-run != 'true' && github.ref_type == 'tag' }}
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          set -euo pipefail
          DRY_RUN_FLAG=""
          if [ "${{ inputs.dry-run }}" = "true" ]; then
            DRY_RUN_FLAG="--dry-run"
          fi
          UPLOADED_LIST=$(mktemp)

          # Drift guard: the publish count + roster are owned by
          # scripts/gen-roster.ts and generated into scripts/ci/publish-roster.json;
          # the gen-roster --check step above already proved that JSON matches the
          # workspace and that this job carries no hand-written package literals.
          # Read the expected count from the JSON and re-derive the actual on-disk
          # publishable count independently (release.yml's own predicate:
          # `private != true`). If a package is added or removed in packages/
          # without regenerating the roster, this assertion fails loud rather than
          # silently skipping the new one — regenerate with
          # `pnpm exec tsx scripts/gen-roster.ts --write`.
          EXPECTED_PUBLISHABLE=$(jq -r '.expectedPublishable' scripts/ci/publish-roster.json)
          ACTUAL_PUBLISHABLE=$(find packages -maxdepth 2 -name package.json -print0 \
            | xargs -0 -I {} jq -r 'select(.private != true) | .name' {} \
            | wc -l)
          if [ "$ACTUAL_PUBLISHABLE" -ne "$EXPECTED_PUBLISHABLE" ]; then
            echo "::error::Workspace has $ACTUAL_PUBLISHABLE publishable packages but scripts/ci/publish-roster.json expects $EXPECTED_PUBLISHABLE. Regenerate with: pnpm exec tsx scripts/gen-roster.ts --write"
            exit 1
          fi

          for pkg in $(jq -r '.packages[]' scripts/ci/publish-roster.json); do
            echo "::group::$pkg"
            node packages/cli/bin/czap.mjs ship --filter "$pkg" --provenance $DRY_RUN_FLAG
            if [ "$ATTACH" = "true" ]; then
              shopt -s nullglob
              capsules=(packages/*/*-"$VERSION".shipcapsule.cbor)
              shopt -u nullglob
              for capsule in "${capsules[@]}"; do
                if ! grep -qxF "$capsule" "$UPLOADED_LIST"; then
                  gh release upload "${GITHUB_REF_NAME}" "$capsule" --clobber
                  echo "$capsule" >> "$UPLOADED_LIST"
                fi
              done
            fi
            echo "::endgroup::"
          done

      # Final sweep — belt and braces over the per-package uploads. The
      # nullglob guard keeps a fully-skipped re-run (every capsule already
      # attached by an earlier run, none minted here) from failing on an
      # unmatched glob.
      - name: Attach ShipCapsules to GitHub Release (sweep)
        if: ${{ inputs.dry-run != 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          shopt -s nullglob
          capsules=(packages/*/*-${{ steps.ver.outputs.version }}.shipcapsule.cbor)
          if [ ${#capsules[@]} -gt 0 ]; then
            gh release upload "${GITHUB_REF_NAME}" "${capsules[@]}" --clobber
          else
            echo "No locally-minted capsules to sweep (fully idempotent re-run) — capsules were attached by the original publishing run."
          fi
