name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Serial gauntlet kept as nightly deep-verify (Phase B CI cutover: parallel is the merge gate).
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  format:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: plan
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Run registry-projected format check
        run: ${{ fromJSON(needs.plan.outputs.matrix).specializedChecks.format.command }}

  # Registry-projected CI plan. The parallel merge gate is the RELEASE gauntlet fanned
  # out, so scripts/ci-plan.ts (a PURE projection of @liteship/command's CHECK_REGISTRY —
  # the same source the serial gauntlet phase list projects) partitions the registry into
  # the named parallel lanes and emits them as this job's `matrix` output. Each gauntlet
  # lane then consumes `fromJSON(needs.plan.outputs.matrix)` to confirm — at CI runtime —
  # that its hand-written lane command still matches the projection (the offline meta test
  # tests/unit/meta/ci-registry-parity.test.ts proves byte-identity at merge time).
  # Dist-free + <1min: ci-plan reads only the self-contained check-registry source, so it
  # runs right after install with no workspace build.
  plan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      matrix: ${{ steps.plan.outputs.matrix }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - id: plan
        name: Emit the registry-projected lane matrix
        run: |
          {
            echo "matrix<<PLAN_EOF"
            pnpm exec tsx scripts/ci-plan.ts
            echo "PLAN_EOF"
          } >> "$GITHUB_OUTPUT"

  # Serial full gauntlet — nightly / manual only after Phase B cutover (parallel lane is merge gate).
  truth-linux:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      # fetch-depth: 0 brings the FULL history so the standards:gate phase can run
      # `git show <base>:traceability/standards-snapshot.json` against the review base
      # (the raccoon-rule backstop diffs the LIVE surface against the PRIOR, INDEPENDENT
      # baseline — never the working-tree snapshot). A shallow checkout has neither the
      # parent commit nor the fetched base branch, so the gate would fail CLOSED.
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium chromium-headless-shell
      - run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - run: pnpm run build
      - name: Configure git identity for doctor --ci
        run: |
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
      # Resolve the standards-integrity base ref DETERMINISTICALLY (the snapshot the
      # change is REVIEWED against). The raccoon-rule backstop (gauntlet:full's
      # `standards:gate` phase) diffs the LIVE standards surface against the snapshot AS
      # COMMITTED ON THIS REF — so a same-commit weaken+regenerate still diffs as a
      # weakening versus the base. Two cases, both choosing a ref that HAS the snapshot:
      #   - pull_request: the PR base BRANCH, fetched and named as `origin/<base>`. The
      #     diff is exactly "this PR vs what it merges into" (the true review base). The
      #     checkout above already created `refs/remotes/pull/<n>/merge`; we fetch the
      #     base branch tip explicitly so `git show origin/<base>:…` resolves.
      #   - push (to main or a feature branch): `github.event.before` — the SHA the ref
      #     pointed at BEFORE this push. This covers the ENTIRE pushed range, NOT just the
      #     last commit. (`HEAD~1` only diffed the last commit's parent, so a weakening
      #     introduced EARLIER in a multi-commit push — already present at HEAD~1 — sailed
      #     through. `before` is the true range base, so an earlier-commit weakening is
      #     diffed and caught.) `before` is the prior tip, which HAS the snapshot; we fetch
      #     it explicitly so `git show <before>:…` resolves even on a non-default checkout.
      #     BOOTSTRAP: the FIRST push of a brand-new branch has no prior tip, so `before`
      #     is the all-zeros sentinel. We then fall back to the merge-base with the
      #     integration branch (main) — the true divergence point — IF main carries the
      #     snapshot; otherwise we leave the zero-SHA in place and the resolver +
      #     readBaseSnapshot FAIL CLOSED (the gate THROWS, never a silent pass).
      # FAIL-CLOSED is preserved throughout: if the chosen ref has no snapshot, the gate
      # THROWS rather than fall back to the working-tree snapshot.
      - name: Resolve standards-integrity base ref
        env:
          PUSH_BEFORE: ${{ github.event.before }}
          BASE_REF: ${{ github.base_ref }}
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch --no-tags --depth=1 origin "$BASE_REF"
            echo "LITESHIP_STANDARDS_BASE_REF=origin/$BASE_REF" >> "$GITHUB_ENV"
          else
            ZERO="0000000000000000000000000000000000000000"
            BASE="$PUSH_BEFORE"
            if [ "$BASE" = "$ZERO" ] || [ -z "$BASE" ]; then
              # Brand-new-branch bootstrap: no prior tip. Use the merge-base with main as
              # the range base (the divergence point) IF main has the snapshot; else keep
              # the zero-SHA so the gate fails CLOSED rather than silently passing.
              git fetch --no-tags origin main || true
              if MB="$(git merge-base origin/main HEAD 2>/dev/null)" \
                 && git cat-file -e "$MB:traceability/standards-snapshot.json" 2>/dev/null; then
                BASE="$MB"
              else
                BASE="$ZERO"
              fi
            else
              # The prior tip the ref pointed at before this push — fetch it so
              # `git show <before>:…` resolves over the whole pushed range.
              git fetch --no-tags origin "$BASE" || true
            fi
            echo "LITESHIP_STANDARDS_BASE_REF=$BASE" >> "$GITHUB_ENV"
          fi
      - run: pnpm run gauntlet:full
        env:
          CI: true
      - uses: actions/upload-artifact@v7
        if: always()
        continue-on-error: true
        with:
          name: truth-artifacts-linux
          path: |
            coverage
            reports
            benchmarks

  # Parallel truth-linux lane — merge gate (serial demoted to nightly after Phase B).
  # Build once, fan out: vitest shards N=4, isolated bench, quarantined capsule:verify.
  # Bench is NEVER sharded.
  truth-linux-parallel-setup:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs:
      - plan
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # action implementation pinned
        with:
          # Projection of rust-toolchain.toml; check/devcontainer-pins rejects drift.
          toolchain: 1.85.1
          targets: wasm32-unknown-unknown
      - run: pnpm exec playwright install --with-deps chromium chromium-headless-shell
      - run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - name: Configure git identity for doctor --ci
        run: |
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
      - run: pnpm run build && pnpm run capsule:compile
      - name: Run registry-projected environment doctor
        run: ${{ fromJSON(needs.plan.outputs.matrix).specializedChecks.doctor.command }}
      - name: Mint gauntlet run context for parallel fan-out
        run: pnpm exec tsx scripts/mint-gauntlet-context.ts
      - uses: actions/upload-artifact@v7
        with:
          name: dist-packages
          path: |
            packages/*/dist
            reports/capsule-manifest.json
            reports/gauntlet-context.json
          retention-days: 1

  truth-linux-parallel-preflight:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs:
      - truth-linux-parallel-setup
      - plan
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - uses: actions/download-artifact@v7
        with:
          name: dist-packages
          path: .
      - name: Confirm lane matches the registry-projected plan
        env:
          PLANNED_PROFILE: ${{ fromJSON(needs.plan.outputs.matrix).lanes.preflight.profile }}
        run: test "$PLANNED_PROFILE" = "ci-parallel-preflight"
      - run: pnpm run gauntlet:full -- --profile ci-parallel-preflight --skip-build
        env:
          CI: true

  truth-linux-parallel-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs:
      - truth-linux-parallel-setup
      - plan
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - uses: actions/download-artifact@v7
        with:
          name: dist-packages
          path: .
      - name: Confirm lane matches the registry-projected plan
        env:
          PLANNED_COMMAND: ${{ fromJSON(needs.plan.outputs.matrix).lanes.shardedTest.command }}
        run: test "$PLANNED_COMMAND" = "pnpm run test:shard"
      - run: pnpm run test:shard
        env:
          CI: true
          LITESHIP_SHARD_INDEX: ${{ matrix.shard }}
          LITESHIP_SHARD_TOTAL: 4
      - name: Stage shard coverage for artifact upload
        if: always()
        run: |
          set -euo pipefail
          mkdir -p "ci-artifacts/coverage/node-shard-${{ matrix.shard }}"
          if [ -d "coverage/node-shard-${{ matrix.shard }}" ]; then
            cp -r "coverage/node-shard-${{ matrix.shard }}/." "ci-artifacts/coverage/node-shard-${{ matrix.shard }}/"
          fi
          if [ -d "coverage/subprocess-raw-shard/${{ matrix.shard }}" ]; then
            mkdir -p "ci-artifacts/coverage/subprocess-raw-shard/${{ matrix.shard }}"
            cp -r "coverage/subprocess-raw-shard/${{ matrix.shard }}/." "ci-artifacts/coverage/subprocess-raw-shard/${{ matrix.shard }}/"
          fi
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-shard-${{ matrix.shard }}
          path: ci-artifacts/coverage
          retention-days: 1

  truth-linux-parallel-bench:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs:
      - truth-linux-parallel-setup
      - plan
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - uses: actions/download-artifact@v7
        with:
          name: dist-packages
          path: .
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # action implementation pinned
        with:
          # Projection of rust-toolchain.toml; check/devcontainer-pins rejects drift.
          toolchain: 1.85.1
          targets: wasm32-unknown-unknown
      - run: pnpm exec playwright install --with-deps chromium chromium-headless-shell
      - run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - run: pnpm run build:wasm
      - name: Confirm lane matches the registry-projected plan
        env:
          PLANNED_PROFILE: ${{ fromJSON(needs.plan.outputs.matrix).lanes.bench.profile }}
        run: test "$PLANNED_PROFILE" = "ci-parallel-bench"
      - run: pnpm run gauntlet:full -- --profile ci-parallel-bench --skip-build
        env:
          CI: true
      - name: Run registry-projected allocation gate
        run: ${{ fromJSON(needs.plan.outputs.matrix).specializedChecks.benchAlloc.command }}
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: benchmarks-parallel
          path: benchmarks
          retention-days: 1

  truth-linux-parallel-mutating:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs:
      - truth-linux-parallel-setup
      - plan
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - uses: actions/download-artifact@v7
        with:
          name: dist-packages
          path: .
      - name: Confirm lane matches the registry-projected plan
        env:
          PLANNED_PROFILE: ${{ fromJSON(needs.plan.outputs.matrix).lanes.mutating.profile }}
        run: test "$PLANNED_PROFILE" = "ci-parallel-mutating"
      - run: pnpm run gauntlet:full -- --profile ci-parallel-mutating --skip-build
        env:
          CI: true

  truth-linux-parallel-integration:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs:
      - truth-linux-parallel-setup
      - plan
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - uses: actions/download-artifact@v7
        with:
          name: dist-packages
          path: .
      - run: pnpm exec playwright install --with-deps chromium chromium-headless-shell
      - run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - name: Confirm lane matches the registry-projected plan
        env:
          PLANNED_PROFILE: ${{ fromJSON(needs.plan.outputs.matrix).lanes.integration.profile }}
        run: test "$PLANNED_PROFILE" = "ci-parallel-integration"
      - run: pnpm run gauntlet:full -- --profile ci-parallel-integration --skip-build
        env:
          CI: true

  truth-linux-parallel-mid:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs:
      - truth-linux-parallel-setup
      - plan
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - uses: actions/download-artifact@v7
        with:
          name: dist-packages
          path: .
      - name: Confirm lane matches the registry-projected plan
        env:
          PLANNED_PROFILE: ${{ fromJSON(needs.plan.outputs.matrix).lanes.mid.profile }}
        run: test "$PLANNED_PROFILE" = "ci-parallel-mid"
      - run: pnpm run gauntlet:full -- --profile ci-parallel-mid --skip-build
        env:
          CI: true

  # Packed-consumer release authority. These checks are registry-projected
  # specialized checks rather than a fabricated gauntlet profile: each runs its
  # exact CHECK_REGISTRY command against the build artifact from setup.
  truth-linux-parallel-consumer:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs:
      - truth-linux-parallel-setup
      - plan
    steps:
      - uses: actions/checkout@v6
        with:
          # journey-upgrade exports the frozen pre-operation control 2141ec25.
          # A depth-1 checkout cannot materialize that genuine prior source.
          fetch-depth: 0
          persist-credentials: false
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - uses: actions/download-artifact@v7
        with:
          name: dist-packages
          path: .
      - name: Run registry-projected consumer journeys
        run: ${{ fromJSON(needs.plan.outputs.matrix).specializedChecks.journey.command }}
        env:
          CI: true
      - name: Run registry-projected hermetic closure
        run: ${{ fromJSON(needs.plan.outputs.matrix).specializedChecks.hermetic.command }}
        env:
          CI: true

  truth-linux-parallel-coverage-browser:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs:
      - truth-linux-parallel-setup
      - plan
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - uses: actions/download-artifact@v7
        with:
          name: dist-packages
          path: .
      - run: pnpm exec playwright install --with-deps chromium chromium-headless-shell
      - run: pnpm exec rimraf coverage/subprocess-raw
      - name: Confirm lane matches the registry-projected plan
        env:
          PLANNED_COMMAND: ${{ fromJSON(needs.plan.outputs.matrix).lanes.coverage.command }}
        run: test "$PLANNED_COMMAND" = "pnpm run coverage:browser"
      - run: pnpm run coverage:browser
        env:
          CI: true
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-browser-parallel
          path: coverage/browser
          retention-days: 1

  truth-linux-parallel-merge-coverage:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs:
      - truth-linux-parallel-setup
      - truth-linux-parallel-test
      - truth-linux-parallel-coverage-browser
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - uses: actions/download-artifact@v7
        with:
          name: dist-packages
          path: .
      - uses: actions/download-artifact@v7
        with:
          pattern: coverage-shard-*
          merge-multiple: true
          path: coverage
      - uses: actions/download-artifact@v7
        with:
          name: coverage-browser-parallel
          path: coverage/browser
      - run: pnpm run coverage:merge-shards
        env:
          CI: true

  truth-linux-parallel-final:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs:
      - truth-linux-parallel-setup
      - truth-linux-parallel-preflight
      - truth-linux-parallel-test
      - truth-linux-parallel-bench
      - truth-linux-parallel-mutating
      - truth-linux-parallel-integration
      - truth-linux-parallel-mid
      - truth-linux-parallel-consumer
      - truth-linux-parallel-merge-coverage
      - plan
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - uses: actions/download-artifact@v7
        with:
          name: dist-packages
          path: .
      - name: Configure git identity for doctor --ci
        run: |
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
      - name: Resolve standards-integrity base ref
        env:
          PUSH_BEFORE: ${{ github.event.before }}
          BASE_REF: ${{ github.base_ref }}
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch --no-tags --depth=1 origin "$BASE_REF"
            echo "LITESHIP_STANDARDS_BASE_REF=origin/$BASE_REF" >> "$GITHUB_ENV"
          else
            ZERO="0000000000000000000000000000000000000000"
            BASE="$PUSH_BEFORE"
            if [ "$BASE" = "$ZERO" ] || [ -z "$BASE" ]; then
              git fetch --no-tags origin main || true
              if MB="$(git merge-base origin/main HEAD 2>/dev/null)" \
                 && git cat-file -e "$MB:traceability/standards-snapshot.json" 2>/dev/null; then
                BASE="$MB"
              else
                BASE="$ZERO"
              fi
            else
              git fetch --no-tags origin "$BASE" || true
            fi
            echo "LITESHIP_STANDARDS_BASE_REF=$BASE" >> "$GITHUB_ENV"
          fi
      - uses: actions/download-artifact@v7
        with:
          pattern: coverage-shard-*
          merge-multiple: true
          path: coverage
      - uses: actions/download-artifact@v7
        with:
          name: coverage-browser-parallel
          path: coverage/browser
      - uses: actions/download-artifact@v7
        with:
          name: benchmarks-parallel
          path: benchmarks
      - run: pnpm run coverage:merge-shards
        env:
          CI: true
      - name: Run registry-projected DevX policy check
        run: ${{ fromJSON(needs.plan.outputs.matrix).specializedChecks.devx.command }}
      - name: Confirm lane matches the registry-projected plan
        env:
          PLANNED_PROFILE: ${{ fromJSON(needs.plan.outputs.matrix).lanes.final.profile }}
        run: test "$PLANNED_PROFILE" = "ci-parallel-final"
      - run: pnpm run gauntlet:full -- --profile ci-parallel-final --skip-build
        env:
          CI: true
      - uses: actions/upload-artifact@v7
        if: always()
        continue-on-error: true
        with:
          name: truth-artifacts-linux-parallel
          path: |
            coverage
            reports
            benchmarks

  truth-linux-parallel:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs:
      - truth-linux-parallel-final
    steps:
      - run: echo "Parallel truth-linux lane passed."

  browser-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
      - run: pnpm exec playwright install --with-deps ${{ matrix.browser }}
      - run: pnpm exec vitest run --config vitest.browser.config.ts
        env:
          CI: true
          LITESHIP_VITEST_BROWSERS: ${{ matrix.browser }}
      - run: pnpm run test:e2e
        if: matrix.browser == 'chromium'
        env:
          CI: true
          LITESHIP_PLAYWRIGHT_BROWSER: ${{ matrix.browser }}
      - run: pnpm exec playwright test --config tests/e2e/playwright.config.ts tests/e2e/stream.e2e.ts --workers 1
        if: matrix.browser != 'chromium'
        env:
          CI: true
          LITESHIP_PLAYWRIGHT_BROWSER: ${{ matrix.browser }}
      - uses: actions/upload-artifact@v7
        if: always()
        continue-on-error: true
        with:
          name: browser-artifacts-${{ matrix.browser }}
          path: |
            tests/browser/__screenshots__
            playwright-report
          if-no-files-found: ignore

  # Rust/WASM kernel truth: the liteship-compute crate's unit tests, a fresh
  # wasm32 build from source, and the WASM-vs-fallbackKernels parity
  # property suite running against that fresh artifact — the "build truth"
  # doctrine applied to the compute kernels (nothing prebuilt is trusted).
  rust-wasm-parity:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # action implementation pinned
        with:
          # Projection of rust-toolchain.toml; check/devcontainer-pins rejects drift.
          toolchain: 1.85.1
          targets: wasm32-unknown-unknown
      - run: cargo test
        working-directory: crates/liteship-compute
        env:
          RUSTFLAGS: -D warnings
      - run: cargo build --release --target wasm32-unknown-unknown
        working-directory: crates/liteship-compute
        env:
          RUSTFLAGS: -D warnings
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Build the TS workspace so the vitest config can load: its alias setup
      # imports `@liteship/core` config → `cbor.ts` → `@liteship/canonical`, whose
      # config-load resolution needs the package's `dist` (the `development→src`
      # export condition is not honored when the config bundle is built). The
      # WASM kernel is still rebuilt from Rust above — nothing prebuilt is trusted.
      - run: pnpm run build
      - name: Artifact must exist — otherwise the parity suite self-skips
        run: test -f crates/liteship-compute/target/wasm32-unknown-unknown/release/liteship_compute.wasm
      # Run the WASM/TS kernel parity suite AND the float-determinism property
      # tests against the freshly-built wasm artifact — the blend kernel has no
      # WASM twin but is accumulation-order-sensitive, so its determinism proof
      # belongs on the one runner that exercises the real compiled kernels.
      - run: >-
          pnpm exec vitest run
          tests/unit/core/wasm-parity.test.ts
          tests/property/blend-determinism.prop.test.ts
        env:
          CI: true
      # 0.2.1 shipping path: stage the freshly-built kernel into @liteship/core's
      # publish surface and prove it lands where the @liteship/vite resolver and the
      # `./liteship-compute.wasm` export expect it — the artifact an installed
      # consumer resolves from node_modules, validated on the one runner that
      # has the Rust toolchain.
      - name: Stage + verify the shipped artifact
        run: |
          pnpm run build:wasm
          test -f packages/core/dist/liteship-compute.wasm
      - run: pnpm exec vitest run tests/unit/core/wasm-shipping.test.ts
        env:
          CI: true

  windows-smoke:
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
      - run: pnpm run typecheck
      - run: pnpm run lint
      - run: pnpm exec tsx packages/cli/src/bin.ts check-invariants
      - run: pnpm test
      - run: pnpm run test:vite
      - run: pnpm run test:astro
      - run: pnpm run test:cloudflare
      - run: pnpm run test:cloudflare-dev
      - run: pnpm run test:tailwind
      - run: pnpm run test:redteam
      - run: pnpm run package:smoke

  # macOS is tier-2: not gating, but a real signal so the docs aren't
  # asking adopters to discover macOS-specific drift after they ship.
  # `continue-on-error: true` keeps a macOS regression from blocking
  # merges into main; it surfaces in the PR check list as a yellow,
  # not a red. Promotion to tier-1 (= remove continue-on-error and
  # add to ci-summary needs) requires the smoke passing reliably for
  # a full release cycle on a fresh `macos-latest` image.
  macos-smoke:
    runs-on: macos-latest
    timeout-minutes: 60
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
      - run: pnpm run typecheck
      - run: pnpm run lint
      - run: pnpm exec tsx packages/cli/src/bin.ts check-invariants
      - run: pnpm test
      - run: pnpm run test:vite
      - run: pnpm run test:astro
      - run: pnpm run test:cloudflare
      - run: pnpm run test:cloudflare-dev
      - run: pnpm run test:tailwind
      - run: pnpm run test:redteam
      - run: pnpm run package:smoke

  # Milestone-2: Playwright browser lane on macOS — proves green for a cycle
  # before promotion to tier-1 (drop continue-on-error + add to ci-summary).
  macos-browser:
    runs-on: macos-latest
    timeout-minutes: 90
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium
      - run: brew install ffmpeg || true
      - run: pnpm run build
      - run: pnpm run test:e2e
      - run: pnpm run coverage:browser

  ci-summary:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs:
      - format
      - truth-linux-parallel
      - browser-e2e
      - windows-smoke
      - rust-wasm-parity
    steps:
      - run: echo "CI truth lanes passed (parallel merge gate; serial nightly-only)."
