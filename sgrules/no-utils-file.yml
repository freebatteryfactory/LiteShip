# Grab-bag ban (ADR-0045) — a file named `utils.ts` / `helpers.ts` /
# `*-utils.ts` / `*-helpers.ts` is a naming admission that a home was never
# found: it becomes an unbounded dumping ground with no single responsibility and
# no re-export discipline. Every function has a real domain; name the file after
# that domain. The P4 core migration renamed the two core offenders —
# `math-utils.ts` → `motion/clamp.ts` and `type-utils.ts` → domain-owned
# `authoring/types.ts`, `reactive/types.ts`, and `schema/types.ts` — so
# packages/core/src carries ZERO such files today,
# and this rule keeps it that way.
#
# The rule fires on the mere EXISTENCE of a matching file: it matches the
# `program` root node, so any non-empty file at one of the banned paths is an
# error regardless of contents.
#
# SCOPE — packages/core/src only, for now. Other packages still carry grab-bag
# names TODAY (ratchet plan: rename each to its domain, then widen the glob to
# `**/packages/*/src/**`):
#     packages/cli/src/spawn-helpers.ts
#     packages/cli/src/lib/package-smoke-helpers.ts
#     packages/compiler/src/motion-utils.ts
#     packages/compiler/src/css-utils.ts
#     packages/vite/src/resolve-utils.ts
# Scoping to core (the fully-migrated package) lets this ship green now; each
# other package graduates into the ban as its offenders are renamed. When the
# list above reaches zero, replace `packages/core` with `packages/*` here.
#
# Run: `pnpm run lint:structural`  (CI: gauntlet `lint:structural` phase)
id: no-utils-file
language: typescript
severity: error
message: "Grab-bag filename (utils.ts / helpers.ts / *-utils.ts / *-helpers.ts) is forbidden (ADR-0045) — name the file after its domain (e.g. math-utils → numeric, type-utils → type-level). A util bucket has no single responsibility and no re-export home."
files:
  - "**/packages/core/src/**/utils.ts"
  - "**/packages/core/src/**/helpers.ts"
  - "**/packages/core/src/**/*-utils.ts"
  - "**/packages/core/src/**/*-helpers.ts"
rule:
  kind: program
