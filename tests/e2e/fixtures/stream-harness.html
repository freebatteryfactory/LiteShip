<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>liteship Stream Stress E2E</title>
  </head>
  <body>
    <h1>liteship Stream Stress Harness</h1>
    <p id="status">Running...</p>
    <section id="stream-root" data-liteship-stream-url="/stream" data-liteship-stream-morph="outerHTML">
      <div data-liteship-id="hero-copy">initial</div>
    </section>
    <script type="module" src="/stream-bundle.js"></script>
    <script type="module">
      window.__streamPromise
        .then(() => {
          document.getElementById('status').textContent =
            'Done -- ' + window.__streamResult.morphCount + ' morphs, ' + window.__streamResult.reconnectCount + ' reconnects';
        })
        .catch((err) => {
          document.getElementById('status').textContent = 'Error: ' + err;
        });
    </script>
  </body>
</html>
